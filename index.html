<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Produtos SuperBom</title>
</head>
<body>
    <div class="container">
        <h1>P.A.R</h1>
        <div class="card">
            <label for="produtos">Escolha o produto:</label>
            <select id="produtos">
                <option value="">Carregando produtos...</option>
            </select>

            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" min="0" placeholder="Ex: 5">
            
            <button class="btn-confirmar" onclick="salvarDados()">Confirmar</button>
        </div>

        <div class="nav-buttons">
            <button class="btn-link" onclick="window.location.href='relatorio.html'">Ir para Relatório</button>
            <button class="btn-acao" onclick="window.location.href='adicionar.html'" style="margin-top: 10px; background-color: #7f8c8d; color: white; width: 100%; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">Configurar Produtos</button>
        </div>
    </div>

    <script>
        // Função para carregar os produtos cadastrados na página "Adicionar"
        function carregarProdutos() {
            const estoqueConfig = JSON.parse(localStorage.getItem('estoque_config')) || {};
            const select = document.getElementById('produtos');
            
            // Limpa o select
            select.innerHTML = "";

            const produtosCadastrados = Object.keys(estoqueConfig);

            if (produtosCadastrados.length === 0) {
                const opt = document.createElement('option');
                opt.innerHTML = "Nenhum produto cadastrado";
                select.appendChild(opt);
                return;
            }

            // Preenche o select com os nomes dos produtos do localStorage
            produtosCadastrados.forEach(nome => {
                const opt = document.createElement('option');
                opt.value = nome;
                opt.innerHTML = nome;
                select.appendChild(opt);
            });
        }

        function salvarDados() {
            const produto = document.getElementById('produtos').value;
            const qtd = document.getElementById('quantidade').value;
            const estoqueConfig = JSON.parse(localStorage.getItem('estoque_config')) || {};

            if (produto === "" || produto === "Nenhum produto cadastrado") {
                return alert("Cadastre produtos na página de configuração primeiro!");
            }
            
            if (qtd === "") return alert("Digite a quantidade!");

            // Pega o valor inicial que foi cadastrado para esse produto específico
            const valorInicial = estoqueConfig[produto];

            const agora = new Date();
            const novoItem = {
                data: agora.toLocaleDateString('pt-BR'),
                hora: agora.getHours().toString().padStart(2, '0') + ":00",
                nome: produto,
                inicial: valorInicial,
                contado: parseInt(qtd),
                vendido: valorInicial - parseInt(qtd)
            };

            let banco = JSON.parse(localStorage.getItem('dados_estoque')) || [];
            banco.push(novoItem);
            localStorage.setItem('dados_estoque', JSON.stringify(banco));

            alert("✅ Salvo com sucesso!");
            document.getElementById('quantidade').value = "";
        }

        // Executa a função assim que a página abre
        window.onload = carregarProdutos;
    </script>
</body>
</html>
