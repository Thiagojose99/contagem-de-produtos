<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>P.A.R - Início</title>
</head>
<body>
    <div class="container">
        <h1>P.A.R</h1>
        
        <div class="card">
            <label>Quem está contando?</label>
            <select id="select-operador"></select>

            <label>Selecione o Produto:</label>
            <select id="select-produto"></select>

            <label>Quantidade na Prateleira:</label>
            <input type="number" id="quantidade" placeholder="Digite o valor">
        </div>

        <div class="botoes-lado-a-lado">
            <button class="btn-confirmar" onclick="salvarDados()">Confirmar</button>
            <button class="btn-link" onclick="window.location.href='relatorio.html'">Relatório</button>
        </div>

        <button class="btn-config" onclick="window.location.href='adicionar.html'">⚙️ Configurações</button>
    </div>

    <script>
        function carregarListas() {
            const produtos = JSON.parse(localStorage.getItem('estoque_config')) || {};
            const operadores = JSON.parse(localStorage.getItem('lista_operadores')) || [];
            
            const selProd = document.getElementById('select-produto');
            const selOp = document.getElementById('select-operador');

            selProd.innerHTML = Object.keys(produtos).map(p => `<option value="${p}">${p}</option>`).join('') || '<option>Cadastre produtos</option>';
            selOp.innerHTML = operadores.map(o => `<option value="${o}">${o}</option>`).join('') || '<option>Cadastre pessoas</option>';
        }

        function salvarDados() {
            const operador = document.getElementById('select-operador').value;
            const produto = document.getElementById('select-produto').value;
            const qtd = parseInt(document.getElementById('quantidade').value);
            const config = JSON.parse(localStorage.getItem('estoque_config')) || {};

            if (isNaN(qtd) || operador.includes("Cadastre")) return alert("Selecione a pessoa e a quantidade!");

            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');
            const horaBloco = agora.getHours().toString().padStart(2, '0') + ":00";
            const horaExata = agora.toLocaleTimeString('pt-BR');

            let banco = JSON.parse(localStorage.getItem('dados_estoque')) || [];
            const index = banco.findIndex(i => i.nome === produto && i.data === dataStr && i.hora === horaBloco);

            if (index !== -1) {
                banco[index].contado += qtd;
                banco[index].vendido = banco[index].inicial - banco[index].contado;
                banco[index].horaExata = horaExata;
                banco[index].operador = operador; 
            } else {
                banco.push({
                    data: dataStr, hora: horaBloco, horaExata: horaExata, operador: operador,
                    nome: produto, inicial: config[produto], contado: qtd, vendido: config[produto] - qtd
                });
            }
            localStorage.setItem('dados_estoque', JSON.stringify(banco));
            alert("✅ Salvo!");
            document.getElementById('quantidade').value = "";
        }
        window.onload = carregarListas;
    </script>
</body>
</html>
