<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>P.A.R - Configurações</title>
</head>
<body>
    <div class="container">
        <h1>Configurações</h1>
        
        <div class="card">
            <h3>📦 Produtos</h3>
            <input type="text" id="nome-produto" placeholder="Nome do Produto">
            <input type="number" id="qtd-inicial" placeholder="Estoque Inicial">
            <button class="btn-confirmar" onclick="adicionarProduto()">Salvar Produto</button>
            <table>
                <tbody id="corpo-produtos"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>👤 Pessoas</h3>
            <input type="text" id="nome-operador" placeholder="Nome da Pessoa">
            <button class="btn-confirmar" style="background-color: #3498db;" onclick="adicionarOperador()">Salvar Pessoa</button>
            <table>
                <tbody id="corpo-operadores"></tbody>
            </table>
        </div>

        <button class="btn-config" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <script>
        function adicionarProduto() {
            const nome = document.getElementById('nome-produto').value.trim();
            const qtd = parseInt(document.getElementById('qtd-inicial').value);
            if (!nome || isNaN(qtd)) return alert("Dados inválidos!");
            let config = JSON.parse(localStorage.getItem('estoque_config')) || {};
            config[nome] = qtd;
            localStorage.setItem('estoque_config', JSON.stringify(config));
            location.reload();
        }

        function adicionarOperador() {
            const nome = document.getElementById('nome-operador').value.trim();
            if (!nome) return alert("Digite o nome!");
            let operadores = JSON.parse(localStorage.getItem('lista_operadores')) || [];
            if (!operadores.includes(nome)) {
                operadores.push(nome);
                localStorage.setItem('lista_operadores', JSON.stringify(operadores));
                location.reload();
            }
        }

        function apagarItem(tipo, valor) {
            if (tipo === 'produto') {
                let config = JSON.parse(localStorage.getItem('estoque_config'));
                delete config[valor];
                localStorage.setItem('estoque_config', JSON.stringify(config));
            } else {
                let ops = JSON.parse(localStorage.getItem('lista_operadores'));
                ops = ops.filter(o => o !== valor);
                localStorage.setItem('lista_operadores', JSON.stringify(ops));
            }
            location.reload();
        }

        window.onload = function() {
            const config = JSON.parse(localStorage.getItem('estoque_config')) || {};
            const ops = JSON.parse(localStorage.getItem('lista_operadores')) || [];
            document.getElementById('corpo-produtos').innerHTML = Object.keys(config).map(n => 
                `<tr><td>${n}</td><td style="text-align:right"><button onclick="apagarItem('produto','${n}')" class="btn-excluir">X</button></td></tr>`
            ).join('');
            document.getElementById('corpo-operadores').innerHTML = ops.map(n => 
                `<tr><td>${n}</td><td style="text-align:right"><button onclick="apagarItem('operador','${n}')" class="btn-excluir">X</button></td></tr>`
            ).join('');
        };
    </script>
</body>
</html>
