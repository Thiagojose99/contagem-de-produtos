 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>P.A.R - Relatório</title>
</head>
<body>
    <div class="container-relatorio">
        <h1>Relatório de Contagem</h1>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn-excel" onclick="exportar()">Excel</button>
            <button class="btn-limpar" onclick="limpar()">Limpar Tudo</button>
        </div>
        <div id="lista-tabelas"></div>
        <button class="btn-link" onclick="window.location.href='index.html'">← Voltar</button>
    </div>

    <script>
        function carregar() {
            const dados = JSON.parse(localStorage.getItem('dados_estoque')) || [];
            const container = document.getElementById('lista-tabelas');
            if (!dados.length) return container.innerHTML = "<p>Sem registros.</p>";

            const grupos = {};
            dados.forEach(d => {
                const chave = `${d.data} - ${d.hora}`;
                if (!grupos[chave]) grupos[chave] = [];
                grupos[chave].push(d);
            });

            container.innerHTML = Object.entries(grupos).map(([ref, itens]) => `
                <div class="bloco-hora">
                    <h3 style="background:#2c3e50">⏰ Horário: ${ref}</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Quem Contou</th>
                                <th>Final</th>
                                <th>Venda</th>
                            </tr>
                        </thead>
                        <tbody>${itens.map(i => `
                            <tr>
                                <td><b>${i.nome}</b><br><small>${i.horaExata}</small></td>
                                <td style="color:#2980b9; font-weight:bold;">👤 ${i.operador}</td>
                                <td style="text-align:center"><b>${i.contado}</b></td>
                                <td class="txt-venda" style="text-align:center">${i.vendido}</td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            `).join('');
        }
        function limpar() { if(confirm("Apagar tudo?")) { localStorage.removeItem('dados_estoque'); location.reload(); } }
        window.onload = carregar;
    </script>
</body>
</html>
